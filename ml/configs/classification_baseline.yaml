project_name: ailegato-classifier-baseline
seed: 42

data:
  raw_dir: ../../data/raw
  image_size: 224
  validation_ratio: 0.15
  test_ratio: 0.15
  classes:
    - clean
    - scratch
    - dent
    - rust

training:
  model: resnet18
  pretrained: true
  epochs: 10
  batch_size: 16
  learning_rate: 0.0003
  optimizer: adamw

export:
  onnx_path: ../../models/ailegato-classifier-baseline-v1/best.onnx
