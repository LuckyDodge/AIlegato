services:
  traffic-gateway:
    build:
      context: ./services/traffic-gateway
    environment:
      API_INGESTION_URL: ${API_INGESTION_URL:-http://api-ingestion:8000}
      GATEWAY_ADDR: ":8080"
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    depends_on:
      api-ingestion:
        condition: service_started

  api-ingestion:
    build:
      context: ./services/api-ingestion
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql+psycopg://ailegato:ailegato@postgres:5432/ailegato}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_BUCKET: ${MINIO_BUCKET:-ailegato-images}
    ports:
      - "${API_INGESTION_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  inference-worker:
    build:
      context: ./services/inference-worker
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MODEL_MODE: ${MODEL_MODE:-fake}
      MODEL_REGISTRY_PATH: /app/model-registry/models.yaml
    volumes:
      - ./model-registry:/app/model-registry:ro
      - ./models:/app/models:ro
    ports:
      - "${INFERENCE_WORKER_PORT:-9101}:9101"
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ailegato}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ailegato}
      POSTGRES_DB: ${POSTGRES_DB:-ailegato}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ailegato} -d ${POSTGRES_DB:-ailegato}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
